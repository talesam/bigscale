services:

  # ─── BigScale (server + painel + init em uma imagem só) ───────────────────
  bigscale:
    image: bigscale:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION:    ${BIGSCALE_VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF:    ${VCS_REF:-}
    container_name: bigscale
    restart: unless-stopped
    environment:
      ADMIN_USERNAME:      ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:      ${ADMIN_PASSWORD:-bigscale}
      COOKIE_SECURE:       ${COOKIE_SECURE:-false}
      # Public URL clients reach the coordinator through (must match
      # server_url in /etc/headscale/config.yaml). Without this, /api/v1/preauth-key
      # falls back to http://localhost:8080 and tailscale clients can't reach it.
      BIGSCALE_PUBLIC_URL: ${BIGSCALE_PUBLIC_URL:-}
    volumes:
      - ./config:/etc/bigscale
      - bigscale-data:/var/lib/bigscale
      - bigscale-panel-data:/data
    expose:
      - "3000"
      - "8080"

volumes:
  bigscale-data:
  bigscale-panel-data:
